<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>环线冲刺</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f8f1dc;
      --muted: #a9b1ad;
      --panel: rgba(10, 13, 14, .72);
      --cyan: #00f0c8;
      --gold: #ffcf4a;
      --red: #ff3d3d;
      --green: #58ff7b;
      --charcoal: #080a0a;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 14%, rgba(0, 240, 200, .22), transparent 26rem),
        radial-gradient(circle at 78% 82%, rgba(255, 207, 74, .16), transparent 30rem),
        linear-gradient(135deg, #030404 0%, #101411 48%, #040606 100%);
      color: var(--ink);
      font-family: "Avenir Next Condensed", "DIN Condensed", "Trebuchet MS", sans-serif;
    }

    body::before {
      position: fixed;
      inset: 0;
      pointer-events: none;
      content: "";
      opacity: .28;
      background-image:
        linear-gradient(rgba(255, 255, 255, .035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, .035) 1px, transparent 1px);
      background-size: 42px 42px;
      transform: rotate(-6deg) scale(1.18);
    }

    body::after {
      position: fixed;
      inset: 0;
      pointer-events: none;
      content: "";
      background: repeating-linear-gradient(
        0deg,
        rgba(255, 255, 255, .035) 0,
        rgba(255, 255, 255, .035) 1px,
        transparent 1px,
        transparent 4px
      );
      mix-blend-mode: overlay;
      opacity: .18;
    }

    #game {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      cursor: pointer;
      touch-action: none;
    }

    .hud {
      position: fixed;
      z-index: 3;
      top: max(16px, env(safe-area-inset-top));
      left: max(16px, env(safe-area-inset-left));
      right: max(16px, env(safe-area-inset-right));
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      align-items: start;
      pointer-events: none;
    }

    .brand {
      min-width: 0;
    }

    .brand .name {
      display: block;
      color: var(--ink);
      font-size: clamp(28px, 5vw, 64px);
      font-weight: 900;
      line-height: .82;
      letter-spacing: 0;
      text-transform: uppercase;
      text-shadow: 0 0 26px rgba(0, 240, 200, .34);
    }

    .brand .tag {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-family: "Menlo", "Consolas", monospace;
      font-size: clamp(10px, 1.7vw, 13px);
      letter-spacing: 0;
    }

    .meter {
      justify-self: center;
      display: grid;
      grid-template-columns: repeat(3, minmax(74px, 110px));
      border: 1px solid rgba(248, 241, 220, .16);
      background: var(--panel);
      box-shadow: 0 18px 60px rgba(0, 0, 0, .38);
      backdrop-filter: blur(12px);
    }

    .stat {
      padding: 10px 12px;
      text-align: center;
      border-right: 1px solid rgba(248, 241, 220, .12);
    }

    .stat:last-child {
      border-right: 0;
    }

    .label {
      display: block;
      color: var(--muted);
      font-family: "Menlo", "Consolas", monospace;
      font-size: 10px;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .value {
      display: block;
      margin-top: 2px;
      color: var(--ink);
      font-size: clamp(22px, 3vw, 36px);
      font-weight: 900;
      line-height: .92;
      font-variant-numeric: tabular-nums;
    }

    .side {
      justify-self: end;
      max-width: 210px;
      color: var(--muted);
      font-family: "Menlo", "Consolas", monospace;
      font-size: 11px;
      line-height: 1.45;
      text-align: right;
    }

    .overlay {
      position: fixed;
      z-index: 5;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      pointer-events: none;
    }

    .modal {
      width: min(460px, calc(100vw - 32px));
      padding: 24px;
      border: 1px solid rgba(248, 241, 220, .2);
      background: linear-gradient(180deg, rgba(9, 12, 12, .9), rgba(6, 7, 7, .72));
      box-shadow: 0 28px 90px rgba(0, 0, 0, .55), inset 0 0 0 1px rgba(0, 240, 200, .08);
      backdrop-filter: blur(18px);
      pointer-events: auto;
    }

    .modal h1 {
      margin: 0;
      color: var(--ink);
      font-size: clamp(42px, 13vw, 94px);
      line-height: .78;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .modal p {
      margin: 18px 0 0;
      color: var(--muted);
      font-family: "Menlo", "Consolas", monospace;
      font-size: 13px;
      line-height: 1.55;
    }

    .start-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 22px;
    }

    button {
      min-height: 46px;
      border: 0;
      border-radius: 2px;
      padding: 0 18px;
      background: var(--gold);
      color: #151207;
      font: 900 18px/1 "Avenir Next Condensed", "DIN Condensed", sans-serif;
      letter-spacing: 0;
      text-transform: uppercase;
      box-shadow: 0 0 28px rgba(255, 207, 74, .3);
      cursor: pointer;
    }

    button:active {
      transform: translateY(1px) scale(.99);
    }

    .hint-pill {
      min-height: 46px;
      display: inline-grid;
      place-items: center;
      border: 1px solid rgba(0, 240, 200, .26);
      padding: 0 14px;
      color: var(--cyan);
      font-family: "Menlo", "Consolas", monospace;
      font-size: 12px;
      white-space: nowrap;
    }

    .flash {
      position: fixed;
      z-index: 2;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      background: radial-gradient(circle at center, rgba(255, 207, 74, .22), transparent 54%);
      transition: opacity .18s ease-out;
    }

    .flash.on {
      opacity: 1;
    }

    @media (max-width: 720px) {
      .hud {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .meter {
        justify-self: stretch;
        grid-template-columns: repeat(3, 1fr);
      }

      .side {
        justify-self: start;
        max-width: none;
        text-align: left;
      }

      .brand .name {
        font-size: clamp(34px, 14vw, 58px);
      }

      .modal {
        margin-top: 100px;
      }
    }
  </style>
</head>
<body>
  <canvas id="game" aria-label="环线冲刺游戏画布"></canvas>

  <div class="hud" aria-live="polite">
    <div class="brand">
      <span class="name">RING<br>RUSH</span>
      <span class="tag">一键换轨，别碰红色闸门</span>
    </div>
    <div class="meter">
      <div class="stat">
        <span class="label">score</span>
        <span class="value" id="score">0</span>
      </div>
      <div class="stat">
        <span class="label">combo</span>
        <span class="value" id="combo">x1</span>
      </div>
      <div class="stat">
        <span class="label">best</span>
        <span class="value" id="best">0</span>
      </div>
    </div>
    <div class="side">空格 / 点击 / 触摸：内外环切换<br>连续吃黄钻加倍率，速度会越来越狠</div>
  </div>

  <div class="flash" id="flash"></div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <h1 id="title">环线<br>冲刺</h1>
      <p id="copy">在两条霓虹轨道之间切换，吃掉黄钻，避开红色闸门。每次连击都会把分数和心跳一起抬高。</p>
      <div class="start-row">
        <button id="start">开始</button>
        <span class="hint-pill">Space / Tap</span>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const scoreEl = document.getElementById("score");
      const comboEl = document.getElementById("combo");
      const bestEl = document.getElementById("best");
      const overlay = document.getElementById("overlay");
      const titleEl = document.getElementById("title");
      const copyEl = document.getElementById("copy");
      const startBtn = document.getElementById("start");
      const flash = document.getElementById("flash");

      const TAU = Math.PI * 2;
      const BEST_KEY = "ring-rush-best";
      let audio;
      let w = 0;
      let h = 0;
      let dpr = 1;
      let cx = 0;
      let cy = 0;
      let scale = 1;
      let laneRadii = [92, 148];
      let running = false;
      let last = 0;
      let spawnTimer = 0;
      let shake = 0;
      let score = 0;
      let combo = 0;
      let best = Number(localStorage.getItem(BEST_KEY) || 0);
      let pulse = 0;

      const player = {
        angle: -Math.PI / 2,
        lane: 1,
        targetLane: 1,
        lanePos: 1,
        speed: 1.8,
      };

      const items = [];
      const particles = [];
      const stars = [];

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        w = window.innerWidth;
        h = window.innerHeight;
        canvas.width = Math.floor(w * dpr);
        canvas.height = Math.floor(h * dpr);
        canvas.style.width = `${w}px`;
        canvas.style.height = `${h}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        cx = w / 2;
        cy = h / 2 + (w < 720 ? 70 : 28);
        scale = Math.max(.78, Math.min(1.28, Math.min(w, h) / 560));
        laneRadii = [94 * scale, 154 * scale];
        stars.length = 0;
        for (let i = 0; i < 90; i += 1) {
          stars.push({
            x: Math.random() * w,
            y: Math.random() * h,
            r: Math.random() * 1.8 + .3,
            a: Math.random() * .45 + .08,
          });
        }
      }

      function angularDistance(a, b) {
        let diff = Math.abs((a - b) % TAU);
        return diff > Math.PI ? TAU - diff : diff;
      }

      function normAngle(a) {
        return ((a % TAU) + TAU) % TAU;
      }

      function point(angle, radius) {
        return {
          x: cx + Math.cos(angle) * radius,
          y: cy + Math.sin(angle) * radius,
        };
      }

      function beep(freq, duration, type = "sine", gain = .055) {
        try {
          if (!audio) audio = new (window.AudioContext || window.webkitAudioContext)();
          const osc = audio.createOscillator();
          const vol = audio.createGain();
          osc.type = type;
          osc.frequency.setValueAtTime(freq, audio.currentTime);
          osc.frequency.exponentialRampToValueAtTime(freq * 1.75, audio.currentTime + duration);
          vol.gain.setValueAtTime(gain, audio.currentTime);
          vol.gain.exponentialRampToValueAtTime(.001, audio.currentTime + duration);
          osc.connect(vol);
          vol.connect(audio.destination);
          osc.start();
          osc.stop(audio.currentTime + duration);
        } catch (_) {
          audio = null;
        }
      }

      function reset() {
        score = 0;
        combo = 0;
        spawnTimer = 0;
        shake = 0;
        pulse = 0;
        items.length = 0;
        particles.length = 0;
        player.angle = -Math.PI / 2;
        player.lane = 1;
        player.targetLane = 1;
        player.lanePos = 1;
        player.speed = 1.9;
        updateHud();
      }

      function startGame() {
        if (running) return;
        reset();
        running = true;
        overlay.style.display = "none";
        last = performance.now();
        beep(220, .09, "triangle", .04);
        beep(440, .12, "square", .035);
        requestAnimationFrame(loop);
      }

      function endGame() {
        running = false;
        best = Math.max(best, score);
        localStorage.setItem(BEST_KEY, String(best));
        updateHud();
        titleEl.innerHTML = `${score}<br>分`;
        copyEl.textContent = `最高分 ${best}。刚才的节奏已经够快了，再来一局通常能多撑十秒。`;
        startBtn.textContent = "再来";
        overlay.style.display = "grid";
        shake = 28;
        beep(120, .22, "sawtooth", .06);
      }

      function updateHud() {
        scoreEl.textContent = Math.floor(score);
        comboEl.textContent = `x${Math.max(1, Math.min(9, Math.floor(combo / 5) + 1))}`;
        bestEl.textContent = Math.floor(best);
      }

      function switchLane() {
        if (!running) {
          startGame();
          return;
        }
        player.targetLane = player.targetLane ? 0 : 1;
        pulse = 1;
        addBurst(point(player.angle, laneRadii[player.targetLane]), "#00f0c8", 8, 1.2);
        beep(360 + player.targetLane * 110, .045, "triangle", .025);
      }

      function spawnItem() {
        const difficulty = Math.min(1, score / 900);
        const hazardChance = .36 + difficulty * .22;
        const type = Math.random() < hazardChance ? "hazard" : "gem";
        const lane = Math.random() < .5 ? 0 : 1;
        const ahead = 1.15 + Math.random() * (type === "hazard" ? 2.2 : 2.9);
        const angle = normAngle(player.angle + ahead);

        const tooClose = items.some((it) =>
          it.lane === lane && angularDistance(it.angle, angle) < .34
        );
        if (!tooClose) {
          items.push({ type, lane, angle, life: 0, hit: false });
        }
      }

      function addBurst(origin, color, count, power = 1) {
        for (let i = 0; i < count; i += 1) {
          const a = Math.random() * TAU;
          const v = (60 + Math.random() * 170) * power;
          particles.push({
            x: origin.x,
            y: origin.y,
            vx: Math.cos(a) * v,
            vy: Math.sin(a) * v,
            size: Math.random() * 3.5 + 1.2,
            life: .45 + Math.random() * .35,
            max: .8,
            color,
          });
        }
      }

      function collect(item) {
        item.hit = true;
        combo += 1;
        const mult = Math.max(1, Math.min(9, Math.floor(combo / 5) + 1));
        score += 10 * mult;
        const p = point(item.angle, laneRadii[item.lane]);
        addBurst(p, combo % 10 === 0 ? "#58ff7b" : "#ffcf4a", 18, 1.25);
        pulse = 1.35;
        flash.classList.add("on");
        window.setTimeout(() => flash.classList.remove("on"), 70);
        beep(520 + mult * 48, .06, "sine", .045);
        updateHud();
      }

      function update(dt) {
        const speedBoost = Math.min(2.4, score / 650);
        player.speed = 1.9 + speedBoost + Math.min(1.2, performance.now() / 100000);
        player.angle = normAngle(player.angle + player.speed * dt);
        player.lanePos += (player.targetLane - player.lanePos) * Math.min(1, dt * 14);
        player.lane = Math.round(player.lanePos);

        spawnTimer -= dt;
        const spawnRate = Math.max(.32, .72 - Math.min(.34, score / 2800));
        if (spawnTimer <= 0) {
          spawnItem();
          spawnTimer = spawnRate;
        }

        const playerRadius = laneRadii[0] + (laneRadii[1] - laneRadii[0]) * player.lanePos;
        const playerLane = player.lanePos < .5 ? 0 : 1;
        for (const item of items) {
          item.life += dt;
          const diff = angularDistance(player.angle, item.angle);
          if (!item.hit && item.lane === playerLane && diff < (item.type === "gem" ? .15 : .12)) {
            if (item.type === "gem") {
              collect(item);
            } else {
              const p = point(player.angle, playerRadius);
              addBurst(p, "#ff3d3d", 34, 1.65);
              endGame();
            }
          }
        }

        for (let i = items.length - 1; i >= 0; i -= 1) {
          const item = items[i];
          const passedDelta = normAngle(player.angle - item.angle);
          const passed = passedDelta > .35 && passedDelta < Math.PI && item.life > .7;
          if (item.hit || item.life > 9 || passed) {
            if (item.type === "gem" && !item.hit && combo > 0) combo = Math.max(0, combo - 2);
            items.splice(i, 1);
          }
        }

        for (let i = particles.length - 1; i >= 0; i -= 1) {
          const p = particles[i];
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.vx *= .986;
          p.vy *= .986;
          p.life -= dt;
          if (p.life <= 0) particles.splice(i, 1);
        }

        score += dt * (.6 + combo * .04);
        pulse = Math.max(0, pulse - dt * 3.2);
        shake = Math.max(0, shake - dt * 34);
        updateHud();
      }

      function drawRing(radius, color, width, alpha) {
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.shadowColor = color;
        ctx.shadowBlur = 18;
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, TAU);
        ctx.stroke();
        ctx.restore();
      }

      function drawGem(item) {
        const p = point(item.angle, laneRadii[item.lane]);
        const size = (12 + Math.sin(item.life * 9) * 2) * scale;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(item.angle + Math.PI / 4 + item.life * 2.2);
        ctx.fillStyle = "#ffcf4a";
        ctx.shadowColor = "#ffcf4a";
        ctx.shadowBlur = 24;
        ctx.beginPath();
        ctx.moveTo(0, -size);
        ctx.lineTo(size * .78, 0);
        ctx.lineTo(0, size);
        ctx.lineTo(-size * .78, 0);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,.65)";
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.restore();
      }

      function drawHazard(item) {
        const radius = laneRadii[item.lane];
        const len = .18 + Math.min(.09, score / 9000);
        ctx.save();
        ctx.strokeStyle = "#ff3d3d";
        ctx.lineWidth = 18 * scale;
        ctx.lineCap = "round";
        ctx.shadowColor = "#ff3d3d";
        ctx.shadowBlur = 24;
        ctx.beginPath();
        ctx.arc(cx, cy, radius, item.angle - len, item.angle + len);
        ctx.stroke();
        ctx.strokeStyle = "rgba(255,255,255,.58)";
        ctx.lineWidth = 3 * scale;
        ctx.beginPath();
        ctx.arc(cx, cy, radius, item.angle - len * .76, item.angle + len * .76);
        ctx.stroke();
        ctx.restore();
      }

      function drawPlayer() {
        const radius = laneRadii[0] + (laneRadii[1] - laneRadii[0]) * player.lanePos;
        const p = point(player.angle, radius);
        const tangent = player.angle + Math.PI / 2;
        const glow = 1 + pulse * .55;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(tangent);
        ctx.shadowColor = "#00f0c8";
        ctx.shadowBlur = 34 * glow;
        ctx.fillStyle = "#00f0c8";
        ctx.beginPath();
        ctx.roundRect(-16 * scale * glow, -7 * scale * glow, 32 * scale * glow, 14 * scale * glow, 6 * scale);
        ctx.fill();
        ctx.fillStyle = "#f8f1dc";
        ctx.fillRect(2 * scale, -2 * scale, 12 * scale, 4 * scale);
        ctx.restore();

        const tail = point(player.angle - .12, radius);
        ctx.save();
        ctx.strokeStyle = "rgba(0, 240, 200, .34)";
        ctx.lineWidth = 9 * scale;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(tail.x, tail.y);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
        ctx.restore();
      }

      function draw() {
        ctx.clearRect(0, 0, w, h);
        ctx.save();
        if (shake > 0) {
          ctx.translate((Math.random() - .5) * shake, (Math.random() - .5) * shake);
        }

        for (const s of stars) {
          ctx.fillStyle = `rgba(248,241,220,${s.a})`;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, TAU);
          ctx.fill();
        }

        const coreGradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, laneRadii[1] * 1.6);
        coreGradient.addColorStop(0, "rgba(0,240,200,.14)");
        coreGradient.addColorStop(.45, "rgba(255,207,74,.06)");
        coreGradient.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = coreGradient;
        ctx.beginPath();
        ctx.arc(cx, cy, laneRadii[1] * 1.6, 0, TAU);
        ctx.fill();

        drawRing(laneRadii[0], "rgba(0,240,200,.72)", 3 * scale, .85);
        drawRing(laneRadii[1], "rgba(255,207,74,.62)", 3 * scale, .78);
        drawRing(laneRadii[0] + (laneRadii[1] - laneRadii[0]) * player.lanePos, "#f8f1dc", 1.5 * scale, .16 + pulse * .22);

        ctx.save();
        ctx.strokeStyle = "rgba(248,241,220,.12)";
        ctx.lineWidth = 1;
        for (let i = 0; i < 18; i += 1) {
          const a = i / 18 * TAU + performance.now() * .00012;
          const p1 = point(a, laneRadii[0] - 26 * scale);
          const p2 = point(a, laneRadii[1] + 28 * scale);
          ctx.beginPath();
          ctx.moveTo(p1.x, p1.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.stroke();
        }
        ctx.restore();

        for (const item of items) {
          if (item.type === "gem") drawGem(item);
          else drawHazard(item);
        }

        if (running) drawPlayer();

        for (const p of particles) {
          ctx.globalAlpha = Math.max(0, p.life / p.max);
          ctx.fillStyle = p.color;
          ctx.shadowColor = p.color;
          ctx.shadowBlur = 14;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, TAU);
          ctx.fill();
          ctx.globalAlpha = 1;
        }

        ctx.restore();
      }

      function loop(now) {
        const dt = Math.min(.033, (now - last) / 1000 || .016);
        last = now;
        if (running) update(dt);
        draw();
        if (running) requestAnimationFrame(loop);
      }

      window.addEventListener("resize", resize);
      window.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        switchLane();
      }, { passive: false });
      window.addEventListener("keydown", (event) => {
        if (event.code === "Space" || event.code === "Enter") {
          event.preventDefault();
          switchLane();
        }
      });
      startBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        startGame();
      });

      if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function roundRect(x, y, width, height, radius) {
          const r = Math.min(radius, width / 2, height / 2);
          this.beginPath();
          this.moveTo(x + r, y);
          this.arcTo(x + width, y, x + width, y + height, r);
          this.arcTo(x + width, y + height, x, y + height, r);
          this.arcTo(x, y + height, x, y, r);
          this.arcTo(x, y, x + width, y, r);
          this.closePath();
        };
      }

      resize();
      bestEl.textContent = best;
      draw();
    })();
  </script>
